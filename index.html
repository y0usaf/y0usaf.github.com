<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Serif:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1f2327;
      --paper: #f3f0e9;
      --card: #eceff1;
      --steel: #5f6b76;
      --line: #b0b7be;
      --mango: #f29f05;
      --mango-deep: #d87900;
      --muted: #4b535a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 0%, #cfd6dd 0%, transparent 36%),
        radial-gradient(circle at 85% 8%, #ffd183 0%, transparent 32%),
        linear-gradient(120deg, #e1e5e8 0%, #f3f0e9 58%, #f7e4bf 100%),
        var(--paper);
      font-family: "IBM Plex Serif", Georgia, serif;
      line-height: 1.5;
      min-height: 100vh;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }

    header {
      border: 1px solid var(--line);
      background: linear-gradient(140deg, #dce1e6 0%, #f7d08b 100%);
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(55, 65, 74, 0.16);
      margin-bottom: 28px;
      padding: 18px 20px 20px;
      position: relative;
      overflow: hidden;
    }

    header::after {
      content: "";
      position: absolute;
      right: -50px;
      top: -50px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(242, 159, 5, 0.46) 0%, rgba(242, 159, 5, 0) 65%);
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4.2vw, 3.1rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
      font-weight: 700;
    }

    .contact {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
      font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
      position: relative;
      z-index: 1;
    }

    .contact a {
      color: #26323d;
      text-decoration: none;
      border-bottom: 1px solid rgba(38, 50, 61, 0.2);
    }

    .contact a:hover { border-bottom-color: var(--mango-deep); color: var(--mango-deep); }

    section { margin-top: 24px; }

    h2 {
      margin: 0 0 14px;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--steel);
      font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
      font-weight: 700;
    }

    .card {
      background: linear-gradient(180deg, #f7f8f9 0%, var(--card) 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 6px 20px rgba(52, 61, 69, 0.1);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(52, 61, 69, 0.14);
    }

    .card-top, .role-top {
      display: flex;
      gap: 10px;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    h3, h4 { margin: 0; }
    h3 {
      font-size: 1.08rem;
      font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
      font-weight: 700;
    }
    h4 {
      font-size: 1rem;
      margin-top: 12px;
      font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
      font-weight: 500;
      color: #2e3942;
    }

    p { margin: 4px 0 0; }
    .meta { color: var(--muted); }

    ul { margin: 8px 0 0; padding-left: 18px; }
    li { margin: 5px 0; }
    li::marker { color: var(--mango-deep); }

    .skill-row {
      border-bottom: 1px solid #c7cdd3;
      padding: 11px 0;
    }

    .skill-row:last-child { border-bottom: 0; }

    .repo-grid, .contrib-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }

    .repo-card, .contrib-card {
      background: linear-gradient(180deg, #f6f8fa 0%, #e9edf0 100%);
      border: 1px solid #bac1c8;
      border-radius: 12px;
      padding: 12px;
    }

    .repo-card h3, .contrib-card h3 {
      margin-bottom: 6px;
      font-size: 1rem;
    }

    .repo-card a, .contrib-card a {
      color: #2a3440;
      text-decoration: none;
      border-bottom: 1px solid rgba(42, 52, 64, 0.25);
    }

    .repo-card a:hover, .contrib-card a:hover {
      color: var(--mango-deep);
      border-bottom-color: var(--mango-deep);
    }

    .repo-meta, .contrib-meta {
      margin-top: 6px;
      color: #55606a;
      font-size: 0.9rem;
      font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
    }

    .notice {
      background: linear-gradient(135deg, #e2e7eb 0%, #ffdca1 100%);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      color: #2d3842;
      font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
    }

    @media (max-width: 680px) {
      .shell { padding-top: 32px; }
      .card { padding: 14px; }
    }
  </style>
</head>
<body>
  <main class="shell" id="app">
    <div class="notice">Loading latest resume...</div>
  </main>

  <script>
    const RESUME_TEX_URL = "https://raw.githubusercontent.com/y0usaf/y0usaf.github.com/main/resume.tex";

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function cleanTex(text) {
      return text
        .replaceAll("\\&", "&")
        .replaceAll("\\%", "%")
        .replaceAll("~", " ")
        .replace(/\$\|\$/g, " | ")
        .replace(/\$/g, "")
        .replace(/\\textbf\{([^{}]*)\}/g, "$1")
        .replace(/\\textit\{([^{}]*)\}/g, "$1")
        .replace(/\\emph\{([^{}]*)\}/g, "$1")
        .replace(/\\underline\{([^{}]*)\}/g, "$1")
        .replace(/\\href\{([^{}]*)\}\{([^{}]*)\}/g, "$2")
        .replace(/\\scshape/g, "")
        .replace(/\\Huge/g, "")
        .replace(/\\small/g, "")
        .replace(/\\vspace\{[^{}]*\}/g, "")
        .replace(/\\[a-zA-Z]+/g, "")
        .replace(/[{}]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function stripLineComments(text) {
      return text.replace(/^\s*%.*\n?/gm, "");
    }

    function sectionBlock(tex, title) {
      const sections = {
        "Experience": /\\section\{Experience\}([\s\S]*?)(?=\\section\{|\\end\{document\})/,
        "Education": /\\section\{Education\}([\s\S]*?)(?=\\section\{|\\end\{document\})/,
        "Projects": /\\section\{Projects\}([\s\S]*?)(?=\\section\{|\\end\{document\})/,
        "Technical Skills": /\\section\{Technical Skills\}([\s\S]*?)(?=\\section\{|\\end\{document\})/
      };

      const re = sections[title];
      if (!re) return "";
      const match = tex.match(re);
      return match ? match[1] : "";
    }

    function parseHeader(tex) {
      const center = tex.match(/\\begin\{center\}([\s\S]*?)\\end\{center\}/);
      const block = center ? center[1] : "";

      const nameMatch = block.match(/\\textbf\{\\Huge\s+\\scshape\s+([^}]*)\}/);
      const name = nameMatch ? cleanTex(nameMatch[1]) : "Your Name";

      const hrefs = [...block.matchAll(/\\href\{([^{}]+)\}\{((?:[^{}]|\{[^{}]*\})*)\}/g)];
      let email = "";
      let linkedin = "";
      let github = "";

      for (const [, rawLink, rawLabel] of hrefs) {
        let link = rawLink;
        const label = cleanTex(rawLabel);
        if (link.includes("...") && /^https?:\/\//.test(label)) link = label;

        if (link.startsWith("mailto:")) email = link.slice("mailto:".length);
        else if (link.includes("linkedin.com")) linkedin = link;
        else if (link.includes("github.com")) github = link;
      }

      const phoneMatch = block.match(/\\small\s*([^$\\]+)/);
      const phone = phoneMatch ? cleanTex(phoneMatch[1]) : "";

      return { name, phone, email, linkedin, github };
    }

    function parseExperience(section) {
      const companies = [];
      const companyRe = /\\resumeSubheading\s*\{([^{}]*)\}\s*\{([^{}]*)\}\s*\{([^{}]*)\}\s*\{([^{}]*)\}([\s\S]*?)(?=\s*\\resumeSubheading|\s*\\resumeSubHeadingListEnd|$)/g;
      let companyMatch;

      while ((companyMatch = companyRe.exec(section)) !== null) {
        const [, company, location, _unused1, _unused2, body] = companyMatch;
        const roles = [];

        const roleRe = /\\resumeSubSubheading\s*\{([^{}]*)\}\s*\{([^{}]*)\}([\s\S]*?)(?=\s*\\resumeSubSubheading|\s*\\resumeSubheading|\s*\\resumeSubHeadingListEnd|$)/g;
        let roleMatch;
        while ((roleMatch = roleRe.exec(body)) !== null) {
          const [, title, dates, roleBody] = roleMatch;
          const bullets = [...roleBody.matchAll(/\\resumeItem\{([^{}]*)\}/g)].map((m) => cleanTex(m[1]));
          roles.push({ title: cleanTex(title), dates: cleanTex(dates), bullets });
        }

        companies.push({ company: cleanTex(company), location: cleanTex(location), roles });
      }

      return companies;
    }

    function parseEducation(section) {
      const entries = [];
      const re = /\\resumeSubheading\s*\{([^{}]*)\}\s*\{([^{}]*)\}\s*\{([^{}]*)\}\s*\{([^{}]*)\}/g;
      let m;
      while ((m = re.exec(section)) !== null) {
        entries.push({ school: cleanTex(m[1]), location: cleanTex(m[2]), degree: cleanTex(m[3]), dates: cleanTex(m[4]) });
      }
      return entries;
    }

    function parseProjects(section) {
      const entries = [];
      const re = /\\resumeProjectHeading\s*\{([^{}]*(?:\{[^{}]*\}[^{}]*)*)\}\{([^{}]*)\}([\s\S]*?)(?=\\resumeProjectHeading|\\resumeSubHeadingListEnd|$)/g;
      let m;
      while ((m = re.exec(section)) !== null) {
        const heading = cleanTex(m[1]);
        const [name, stack = ""] = heading.includes("|") ? heading.split("|").map((x) => x.trim()) : [heading, ""];
        const bullets = [...m[3].matchAll(/\\resumeItem\{([^{}]*)\}/g)].map((x) => cleanTex(x[1]));
        entries.push({ name, stack, dates: cleanTex(m[2]), bullets });
      }
      return entries;
    }

    function parseSkills(section) {
      return [...section.matchAll(/\\textbf\{([^{}]*)\}\{:\s*([^{}]*)\}/g)].map((m) => ({
        label: cleanTex(m[1]),
        values: cleanTex(m[2])
      }));
    }

    function parseGitHubUsername(url) {
      if (!url) return "";
      const cleaned = url.trim();
      const m = cleaned.match(/^https?:\/\/github\.com\/([^/?#]+)/i);
      return m ? m[1] : "";
    }

    function formatDate(iso) {
      if (!iso) return "Unknown date";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }

    async function fetchJson(url) {
      const response = await fetch(url, {
        headers: { Accept: "application/vnd.github+json" },
        cache: "no-store"
      });
      if (!response.ok) throw new Error(`GitHub API ${response.status}`);
      return response.json();
    }

    async function loadGithubData(primaryUser) {
      const fallbackUser = "y0usaf";
      const usersToTry = [primaryUser, fallbackUser].filter(Boolean);
      const app = document.getElementById("github-data");
      const contribApp = document.getElementById("github-contrib");
      if (!app || !contribApp) return;

      let repos = null;
      let events = null;
      let activeUser = "";

      for (const user of usersToTry) {
        try {
          const [repoData, eventData] = await Promise.all([
            fetchJson(`https://api.github.com/users/${user}/repos?sort=updated&per_page=8`),
            fetchJson(`https://api.github.com/users/${user}/events/public?per_page=100`)
          ]);
          repos = repoData;
          events = eventData;
          activeUser = user;
          break;
        } catch (_err) {
          // Try fallback username next.
        }
      }

      if (!repos || !events) {
        app.innerHTML = "<div class=\"notice\">Unable to load repositories from GitHub API right now.</div>";
        contribApp.innerHTML = "<div class=\"notice\">Unable to infer contribution targets from GitHub activity right now.</div>";
        return;
      }

      const repoCards = repos
        .filter((repo) => !repo.fork)
        .slice(0, 6)
        .map((repo) => `
          <article class="repo-card">
            <h3><a href="${escapeHtml(repo.html_url)}" target="_blank" rel="noreferrer">${escapeHtml(repo.name)}</a></h3>
            <p>${escapeHtml(repo.description || "No description provided.")}</p>
            <p class="repo-meta">${escapeHtml(repo.language || "No language")} · ★ ${repo.stargazers_count} · Updated ${escapeHtml(formatDate(repo.updated_at))}</p>
          </article>
        `)
        .join("");

      app.innerHTML = repoCards
        ? `<div class="repo-grid">${repoCards}</div>`
        : "<div class=\"notice\">No public repositories found.</div>";

      const contributionRepos = new Map();
      for (const event of events) {
        const fullName = event?.repo?.name || "";
        if (!fullName.includes("/")) continue;
        const owner = fullName.split("/")[0];
        if (!owner || owner.toLowerCase() === activeUser.toLowerCase()) continue;
        if (!contributionRepos.has(fullName)) {
          contributionRepos.set(fullName, {
            fullName,
            owner,
            lastSeen: event.created_at
          });
        }
      }

      const contribCards = [...contributionRepos.values()]
        .sort((a, b) => new Date(b.lastSeen) - new Date(a.lastSeen))
        .slice(0, 8)
        .map((item) => `
          <article class="contrib-card">
            <h3><a href="https://github.com/${escapeHtml(item.fullName)}" target="_blank" rel="noreferrer">${escapeHtml(item.fullName)}</a></h3>
            <p class="contrib-meta">Recent contribution activity observed · ${escapeHtml(formatDate(item.lastSeen))}</p>
          </article>
        `)
        .join("");

      contribApp.innerHTML = contribCards
        ? `<div class="contrib-grid">${contribCards}</div>`
        : "<div class=\"notice\">No recent public contributions outside your own repos were detected in the available GitHub event window.</div>";
    }

    function render(data) {
      const app = document.getElementById("app");
      document.title = data.header.name || "Resume";

      const contact = [];
      if (data.header.phone) contact.push(`<span>${escapeHtml(data.header.phone)}</span>`);
      if (data.header.email) {
        const email = escapeHtml(data.header.email);
        contact.push(`<a href="mailto:${email}">${email}</a>`);
      }
      if (data.header.linkedin) contact.push(`<a href="${escapeHtml(data.header.linkedin)}" target="_blank" rel="noreferrer">LinkedIn</a>`);
      if (data.header.github) contact.push(`<a href="${escapeHtml(data.header.github)}" target="_blank" rel="noreferrer">GitHub</a>`);

      const experienceHtml = data.experience.map((company) => {
        const roles = company.roles.map((role) => `
          <article class="role">
            <div class="role-top">
              <h4>${escapeHtml(role.title)}</h4>
              <p>${escapeHtml(role.dates)}</p>
            </div>
            <ul>${role.bullets.map((b) => `<li>${escapeHtml(b)}</li>`).join("")}</ul>
          </article>
        `).join("");

        return `
          <article class="card">
            <div class="card-top">
              <h3>${escapeHtml(company.company)}</h3>
              <p>${escapeHtml(company.location)}</p>
            </div>
            ${roles}
          </article>
        `;
      }).join("");

      const educationHtml = data.education.map((entry) => `
        <article class="card">
          <div class="card-top">
            <h3>${escapeHtml(entry.school)}</h3>
            <p>${escapeHtml(entry.location)}</p>
          </div>
          <p class="meta">${escapeHtml(entry.degree)}</p>
          <p class="meta">${escapeHtml(entry.dates)}</p>
        </article>
      `).join("");

      const projectsHtml = data.projects.map((project) => `
        <article class="card">
          <div class="card-top">
            <h3>${escapeHtml(project.name)}</h3>
            <p>${escapeHtml(project.dates)}</p>
          </div>
          <p class="meta">${escapeHtml(project.stack)}</p>
          <ul>${project.bullets.map((b) => `<li>${escapeHtml(b)}</li>`).join("")}</ul>
        </article>
      `).join("");

      const skillsHtml = data.skills.map((skill) => `
        <article class="skill-row">
          <h3>${escapeHtml(skill.label)}</h3>
          <p>${escapeHtml(skill.values)}</p>
        </article>
      `).join("");

      app.innerHTML = `
        <header>
          <h1>${escapeHtml(data.header.name)}</h1>
          <div class="contact">${contact.join(" ")}</div>
        </header>

        <section id="experience">
          <h2>Experience</h2>
          ${experienceHtml}
        </section>

        <section id="education">
          <h2>Education</h2>
          ${educationHtml}
        </section>

        <section id="projects">
          <h2>Projects</h2>
          ${projectsHtml}
        </section>

        <section id="skills">
          <h2>Technical Skills</h2>
          ${skillsHtml}
        </section>

        <section id="github-projects">
          <h2>Public GitHub Repositories</h2>
          <div id="github-data" class="notice">Loading repositories...</div>
        </section>

        <section id="contributions">
          <h2>Recent External Contributions</h2>
          <div id="github-contrib" class="notice">Scanning recent public contribution activity...</div>
        </section>
      `;

      loadGithubData(parseGitHubUsername(data.header.github));
    }

    async function loadResume() {
      const app = document.getElementById("app");
      try {
        const response = await fetch(RESUME_TEX_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const tex = stripLineComments(await response.text());
        const data = {
          header: parseHeader(tex),
          experience: parseExperience(sectionBlock(tex, "Experience")),
          education: parseEducation(sectionBlock(tex, "Education")),
          projects: parseProjects(sectionBlock(tex, "Projects")),
          skills: parseSkills(sectionBlock(tex, "Technical Skills"))
        };

        render(data);
      } catch (error) {
        app.innerHTML = `<div class="notice">Failed to load resume from <code>${escapeHtml(RESUME_TEX_URL)}</code><br>${escapeHtml(String(error))}</div>`;
      }
    }

    loadResume();
  </script>
</body>
</html>
