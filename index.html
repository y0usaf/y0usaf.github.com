<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #111111;
      --paper: #ffffff;
      --card: #ffffff;
      --line: #d9d9d9;
      --muted: #666666;
      --focus: #2f2f2f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }

    header {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 8px;
      margin-bottom: 28px;
      padding: 16px 18px;
    }

    .identity {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .identity-main {
      min-width: 0;
      flex: 1;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 3.2vw, 2.3rem);
      letter-spacing: 0.01em;
      font-weight: 700;
    }

    .contact {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .contact a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid #cfcfcf;
    }

    .contact a:hover { border-bottom-color: var(--focus); }

    .avatar-link {
      display: inline-flex;
      border-radius: 999px;
      border: 1px solid var(--line);
      overflow: hidden;
      width: 60px;
      height: 60px;
      flex: 0 0 auto;
      background: #f7f7f7;
    }

    .avatar-link img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    section { margin-top: 24px; }

    h2 {
      margin: 0 0 14px;
      font-size: 1rem;
      letter-spacing: 0.02em;
      color: var(--ink);
      font-weight: 700;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .card-top, .role-top {
      display: flex;
      gap: 10px;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    h3, h4 { margin: 0; }
    h3 {
      font-size: 1rem;
      font-weight: 700;
    }
    h4 {
      font-size: 0.95rem;
      margin-top: 12px;
      font-weight: 500;
      color: #2a2a2a;
    }

    p { margin: 4px 0 0; }
    .meta { color: var(--muted); }

    ul { margin: 8px 0 0; padding-left: 18px; }
    li { margin: 5px 0; }
    li::marker { color: #666666; }

    .skill-row {
      border-bottom: 1px solid #c7cdd3;
      padding: 11px 0;
    }

    .skill-row:last-child { border-bottom: 0; }

    .repo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }

    .contrib-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .repo-card, .contrib-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .repo-card h3, .contrib-card h3 {
      margin-bottom: 6px;
      font-size: 1rem;
    }

    .repo-card a, .contrib-card a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid #cfcfcf;
    }

    .repo-card a:hover, .contrib-card a:hover {
      border-bottom-color: var(--focus);
    }

    .repo-meta, .contrib-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .notice {
      background: #fafafa;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      color: var(--muted);
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 14px;
      padding: 0;
      list-style: none;
    }

    .tab-btn {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .tab-btn:hover {
      border-color: var(--focus);
    }

    .tab-btn.active {
      background: #f2f2f2;
      border-color: #bdbdbd;
      color: var(--ink);
    }

    .panel {
      display: none;
      animation: panelIn 180ms ease;
    }

    .panel.active {
      display: block;
    }

    @keyframes panelIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 680px) {
      .shell { padding-top: 32px; }
      .card { padding: 14px; }
      .contrib-grid { grid-template-columns: 1fr; }
    }

    @media (min-width: 681px) and (max-width: 980px) {
      .contrib-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="shell" id="app">
    <div class="notice">Loading latest resume...</div>
  </main>

  <script>
    const RESUME_TEX_URL = "https://raw.githubusercontent.com/y0usaf/resume/main/resume_samiansari.tex";

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function cleanTex(text) {
      return text
        .replaceAll("\\&", "&")
        .replaceAll("\\%", "%")
        .replaceAll("~", " ")
        .replace(/\$\|\$/g, " | ")
        .replace(/\$/g, "")
        .replace(/\\textbf\{([^{}]*)\}/g, "$1")
        .replace(/\\textit\{([^{}]*)\}/g, "$1")
        .replace(/\\emph\{([^{}]*)\}/g, "$1")
        .replace(/\\underline\{([^{}]*)\}/g, "$1")
        .replace(/\\href\{([^{}]*)\}\{([^{}]*)\}/g, "$2")
        .replace(/\\scshape/g, "")
        .replace(/\\Huge/g, "")
        .replace(/\\small/g, "")
        .replace(/\\vspace\{[^{}]*\}/g, "")
        .replace(/\\[a-zA-Z]+/g, "")
        .replace(/[{}]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function stripLineComments(text) {
      return text.replace(/^\s*%.*\n?/gm, "");
    }

    function extractSections(tex) {
      const sections = {};
      const re = /\\section\{([^}]*)\}([\s\S]*?)(?=\\section\{|\\end\{document\})/g;
      let match;
      while ((match = re.exec(tex)) !== null) {
        const title = cleanTex(match[1]);
        sections[title] = match[2];
      }
      return sections;
    }

    function parseHeader(tex) {
      const center = tex.match(/\\begin\{center\}([\s\S]*?)\\end\{center\}/);
      const block = center ? center[1] : "";

      let name = "Sami Ansari";
      const oldNameMatch = block.match(/\\textbf\{\\Huge\s+\\scshape\s+([^}]*)\}/);
      const modernNameMatch = block.match(/\{\\LARGE\\bfseries\s+([^}]*)\}/);
      if (oldNameMatch) {
        name = cleanTex(oldNameMatch[1]);
      } else if (modernNameMatch) {
        name = cleanTex(modernNameMatch[1]);
      } else {
        const firstLine = block
          .split("\n")
          .map((line) => line.trim())
          .find((line) => line && !line.includes("\\href") && !line.includes("\\rule"));
        if (firstLine) {
          const fallback = cleanTex(firstLine);
          if (fallback) name = fallback;
        }
      }

      const hrefs = [...block.matchAll(/\\href\{([^{}]+)\}\{((?:[^{}]|\{[^{}]*\})*)\}/g)];
      let email = "";
      let linkedin = "";
      let github = "";

      for (const [, rawLink, rawLabel] of hrefs) {
        let link = rawLink;
        const label = cleanTex(rawLabel);
        if (link.includes("...") && /^https?:\/\//.test(label)) link = label;

        if (link.startsWith("mailto:")) email = link.slice("mailto:".length);
        else if (link.includes("linkedin.com")) linkedin = link;
        else if (link.includes("github.com")) github = link;
      }

      let phone = "";
      const telMatch = block.match(/\\href\{tel:[^}]*\}\{([^}]*)\}/);
      if (telMatch) {
        phone = cleanTex(telMatch[1]);
      } else {
        const phoneMatch = block.match(/\\small\s*([^$\\]+)/);
        phone = phoneMatch ? cleanTex(phoneMatch[1]) : "";
      }

      return { name, phone, email, linkedin, github };
    }

    function parseExperience(section) {
      const experienceEntries = [...section.matchAll(/\\experience\{([^{}]*)\}\{([^{}]*)\}\{([^{}]*)\}\{([^{}]*)\}([\s\S]*?)(?=\\hspace\{0\.15in\}[\s\S]*?\\experience\{|$)/g)];
      if (experienceEntries.length > 0) {
        const grouped = [];
        const byCompany = new Map();

        for (const match of experienceEntries) {
          const title = cleanTex(match[1]);
          const dates = cleanTex(match[2]);
          const company = cleanTex(match[3]);
          const location = cleanTex(match[4]);
          const body = match[5] || "";
          const bullets = [...body.matchAll(/\\item\s+([^\n]+)/g)].map((m) => cleanTex(m[1]));

          const companyKey = `${company}::${location}`;
          if (!byCompany.has(companyKey)) {
            const entry = { company, location, roles: [] };
            byCompany.set(companyKey, entry);
            grouped.push(entry);
          }

          byCompany.get(companyKey).roles.push({ title, dates, bullets });
        }

        return grouped;
      }

      const companies = [];
      const companyRe = /\\resumeSubheading\s*\{([^{}]*)\}\s*\{([^{}]*)\}\s*\{([^{}]*)\}\s*\{([^{}]*)\}([\s\S]*?)(?=\s*\\resumeSubheading|\s*\\resumeSubHeadingListEnd|$)/g;
      let companyMatch;

      while ((companyMatch = companyRe.exec(section)) !== null) {
        const [, company, location, _unused1, _unused2, body] = companyMatch;
        const roles = [];

        const roleRe = /\\resumeSubSubheading\s*\{([^{}]*)\}\s*\{([^{}]*)\}([\s\S]*?)(?=\s*\\resumeSubSubheading|\s*\\resumeSubheading|\s*\\resumeSubHeadingListEnd|$)/g;
        let roleMatch;
        while ((roleMatch = roleRe.exec(body)) !== null) {
          const [, title, dates, roleBody] = roleMatch;
          const bullets = [...roleBody.matchAll(/\\resumeItem\{([^{}]*)\}/g)].map((m) => cleanTex(m[1]));
          roles.push({ title: cleanTex(title), dates: cleanTex(dates), bullets });
        }

        companies.push({ company: cleanTex(company), location: cleanTex(location), roles });
      }

      return companies;
    }

    function parseProjects(section) {
      const modernEntries = [...section.matchAll(/\\href\{([^{}]+)\}\{([^{}]*(?:\{[^{}]*\}[^{}]*)*)\}\s*--\s*([^\n]+)/g)];
      if (modernEntries.length > 0) {
        return modernEntries.map((m) => ({
          name: cleanTex(m[2]),
          stack: "",
          dates: "",
          bullets: [cleanTex(m[3])]
        }));
      }

      const entries = [];
      const re = /\\resumeProjectHeading\s*\{([^{}]*(?:\{[^{}]*\}[^{}]*)*)\}\{([^{}]*)\}([\s\S]*?)(?=\\resumeProjectHeading|\\resumeSubHeadingListEnd|$)/g;
      let m;
      while ((m = re.exec(section)) !== null) {
        const heading = cleanTex(m[1]);
        const [name, stack = ""] = heading.includes("|") ? heading.split("|").map((x) => x.trim()) : [heading, ""];
        const bullets = [...m[3].matchAll(/\\resumeItem\{([^{}]*)\}/g)].map((x) => cleanTex(x[1]));
        entries.push({ name, stack, dates: cleanTex(m[2]), bullets });
      }
      return entries;
    }

    function parseSkills(section) {
      const classic = [...section.matchAll(/\\textbf\{([^{}]*)\}\{:\s*([^{}]*)\}/g)].map((m) => ({
        label: cleanTex(m[1]),
        values: cleanTex(m[2])
      }));
      if (classic.length > 0) return classic;

      return [...section.matchAll(/\\textbf\{([^{}]*)\}\s*:\s*([^\n]+)/g)].map((m) => ({
        label: cleanTex(m[1]),
        values: cleanTex(m[2])
      }));
    }

    function parseSpeaking(section) {
      const entries = [];
      const re = /\{\\bfseries\s*([^}]*)\}\s*\\hfill\s*\{\\small\s*([^}]*)\}\s*\\\\([\s\S]*?)(?=\n\s*\\sectionspace|$)/g;
      let m;
      while ((m = re.exec(section)) !== null) {
        const title = cleanTex(m[1]);
        const dates = cleanTex(m[2]);
        const details = cleanTex((m[3] || "").replace(/\\hspace\{[^}]*\}/g, " "));
        entries.push({ title, dates, details });
      }
      return entries;
    }

    function parseGitHubUsername(url) {
      if (!url) return "";
      const cleaned = url.trim();
      const m = cleaned.match(/^https?:\/\/github\.com\/([^/?#]+)/i);
      return m ? m[1] : "";
    }

    function formatDate(iso) {
      if (!iso) return "Unknown date";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }

    async function fetchJson(url) {
      const response = await fetch(url, {
        headers: { Accept: "application/vnd.github+json" },
        cache: "no-store"
      });
      if (!response.ok) throw new Error(`GitHub API ${response.status}`);
      return response.json();
    }

    async function fetchAllUserRepos(user) {
      const repos = [];
      let page = 1;
      while (true) {
        const batch = await fetchJson(`https://api.github.com/users/${user}/repos?type=public&per_page=100&page=${page}`);
        repos.push(...batch);
        if (batch.length < 100) break;
        page += 1;
      }
      return repos;
    }

    function activateTab(tabId) {
      const buttons = document.querySelectorAll(".tab-btn");
      const panels = document.querySelectorAll(".panel");
      buttons.forEach((btn) => {
        const isActive = btn.dataset.tab === tabId;
        btn.classList.toggle("active", isActive);
        btn.setAttribute("aria-selected", isActive ? "true" : "false");
      });
      panels.forEach((panel) => {
        panel.classList.toggle("active", panel.id === tabId);
      });
    }

    function initTabs(defaultTab = "panel-experience") {
      const buttons = document.querySelectorAll(".tab-btn");
      buttons.forEach((btn) => {
        btn.addEventListener("click", () => activateTab(btn.dataset.tab));
      });
      activateTab(defaultTab);
    }

    async function loadGithubData(primaryUser) {
      const fallbackUser = "y0usaf";
      const usersToTry = [primaryUser, fallbackUser].filter(Boolean);
      const app = document.getElementById("github-data");
      const contribApp = document.getElementById("github-contrib");
      if (!app || !contribApp) return;

      let repos = null;
      let events = null;
      let activeUser = "";

      for (const user of usersToTry) {
        try {
          const [repoData, eventData] = await Promise.all([
            fetchAllUserRepos(user),
            fetchJson(`https://api.github.com/users/${user}/events/public?per_page=100`)
          ]);
          repos = repoData;
          events = eventData;
          activeUser = user;
          break;
        } catch (_err) {
          // Try fallback username next.
        }
      }

      if (!repos || !events) {
        app.innerHTML = "<div class=\"notice\">Unable to load repositories from GitHub API right now.</div>";
        contribApp.innerHTML = "<div class=\"notice\">Unable to infer contribution targets from GitHub activity right now.</div>";
        return;
      }

      const repoCards = repos
        .sort((a, b) => {
          const starDiff = (b.stargazers_count || 0) - (a.stargazers_count || 0);
          if (starDiff !== 0) return starDiff;
          return new Date(b.updated_at) - new Date(a.updated_at);
        })
        .map((repo) => `
          <article class="repo-card">
            <h3><a href="${escapeHtml(repo.html_url)}" target="_blank" rel="noreferrer">${escapeHtml(repo.name)}</a></h3>
            <p>${escapeHtml(repo.description || "No description provided.")}</p>
            <p class="repo-meta">${escapeHtml(repo.language || "No language")} · ★ ${repo.stargazers_count} · Updated ${escapeHtml(formatDate(repo.updated_at))}</p>
          </article>
        `)
        .join("");

      app.innerHTML = repoCards
        ? `<div class="repo-grid">${repoCards}</div>`
        : "<div class=\"notice\">No public repositories found.</div>";

      const avatarEl = document.getElementById("profile-avatar");
      if (avatarEl) {
        const avatarUrl = repos[0]?.owner?.avatar_url || "";
        if (avatarUrl) {
          avatarEl.src = avatarUrl;
          avatarEl.alt = `${activeUser} profile photo`;
        }
      }

      const repoForkCache = new Map();
      async function isForkRepo(fullName) {
        if (!fullName) return false;
        if (repoForkCache.has(fullName)) return repoForkCache.get(fullName);
        try {
          const details = await fetchJson(`https://api.github.com/repos/${fullName}`);
          const isFork = !!details?.fork;
          repoForkCache.set(fullName, isFork);
          return isFork;
        } catch (_err) {
          repoForkCache.set(fullName, false);
          return false;
        }
      }

      const contributions = new Map();
      const contributionRepos = new Map();
      for (const event of events) {
        const fullName = event?.repo?.name || "";
        if (!fullName.includes("/")) continue;
        const owner = fullName.split("/")[0];
        if (!owner || owner.toLowerCase() === activeUser.toLowerCase()) continue;

        let contribution = null;
        if (event?.type === "PullRequestEvent" && event?.payload?.number) {
          const number = event.payload.number;
          contribution = {
            key: `${fullName}:pr:${number}`,
            fullName,
            title: `${fullName}#${number}`,
            kind: "Pull request",
            action: event?.payload?.action || "updated",
            url: `https://github.com/${fullName}/pull/${number}`,
            createdAt: event.created_at
          };
        } else if (event?.type === "IssuesEvent" && event?.payload?.issue?.html_url) {
          const issue = event.payload.issue;
          contribution = {
            key: `${fullName}:issue:${issue.number}`,
            fullName,
            title: `${fullName}#${issue.number}`,
            kind: "Issue",
            action: event?.payload?.action || "updated",
            url: issue.html_url,
            createdAt: event.created_at
          };
        } else if (event?.type === "DiscussionEvent" && event?.payload?.discussion?.html_url) {
          const discussion = event.payload.discussion;
          contribution = {
            key: `${fullName}:discussion:${discussion.number}`,
            fullName,
            title: discussion.title || `${fullName} discussion #${discussion.number}`,
            kind: "Discussion",
            action: event?.payload?.action || "updated",
            url: discussion.html_url,
            createdAt: event.created_at
          };
        } else if (event?.type === "IssueCommentEvent" && event?.payload?.issue?.html_url) {
          const issue = event.payload.issue;
          const isPr = !!issue.pull_request;
          contribution = {
            key: `${fullName}:${isPr ? "pr-comment" : "issue-comment"}:${issue.number}`,
            fullName,
            title: `${fullName}#${issue.number}`,
            kind: isPr ? "PR comment" : "Issue comment",
            action: "commented",
            url: issue.html_url,
            createdAt: event.created_at
          };
        } else if (event?.type === "PullRequestReviewEvent" && event?.payload?.pull_request?.html_url) {
          const pr = event.payload.pull_request;
          contribution = {
            key: `${fullName}:pr-review:${pr.number}`,
            fullName,
            title: `${fullName}#${pr.number}`,
            kind: "PR review",
            action: event?.payload?.action || "reviewed",
            url: pr.html_url,
            createdAt: event.created_at
          };
        } else if (event?.type === "PullRequestReviewCommentEvent" && event?.payload?.pull_request?.html_url) {
          const pr = event.payload.pull_request;
          contribution = {
            key: `${fullName}:pr-review-comment:${pr.number}`,
            fullName,
            title: `${fullName}#${pr.number}`,
            kind: "PR review comment",
            action: "commented",
            url: pr.html_url,
            createdAt: event.created_at
          };
        }

        if (contribution && !contributions.has(contribution.key)) {
          contributions.set(contribution.key, contribution);
        }

        if (!contributionRepos.has(fullName)) {
          contributionRepos.set(fullName, {
            fullName,
            owner,
            lastSeen: event.created_at
          });
        }
      }

      const repoNames = new Set([
        ...[...contributions.values()].map((item) => item.fullName).filter(Boolean),
        ...[...contributionRepos.values()].map((item) => item.fullName).filter(Boolean)
      ]);
      const forkChecks = await Promise.all(
        [...repoNames].map(async (name) => [name, await isForkRepo(name)])
      );
      const forkMap = new Map(forkChecks);

      const contributionCards = [...contributions.values()]
        .filter((item) => !forkMap.get(item.fullName))
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
        .slice(0, 9)
        .map((item) => `
          <article class="contrib-card">
            <h3><a href="${escapeHtml(item.url)}" target="_blank" rel="noreferrer">${escapeHtml(item.title)}</a></h3>
            <p class="contrib-meta">${escapeHtml(item.kind)} ${escapeHtml(item.action)} · ${escapeHtml(formatDate(item.createdAt))}</p>
          </article>
        `)
        .join("");

      if (contributionCards) {
        contribApp.innerHTML = `<div class="contrib-grid">${contributionCards}</div>`;
        return;
      }

      const fallbackCards = [...contributionRepos.values()]
        .filter((item) => !forkMap.get(item.fullName))
        .sort((a, b) => new Date(b.lastSeen) - new Date(a.lastSeen))
        .slice(0, 9)
        .map((item) => `
          <article class="contrib-card">
            <h3><a href="https://github.com/${escapeHtml(item.fullName)}" target="_blank" rel="noreferrer">${escapeHtml(item.fullName)}</a></h3>
            <p class="contrib-meta">External activity found · ${escapeHtml(formatDate(item.lastSeen))}</p>
          </article>
        `)
        .join("");

      contribApp.innerHTML = fallbackCards
        ? `<div class="contrib-grid">${fallbackCards}</div>`
        : "<div class=\"notice\">No recent external contributions found in GitHub's public event window.</div>";
    }

    function render(data) {
      const app = document.getElementById("app");
      document.title = data.header.name || "Resume";

      const contact = [];
      if (data.header.phone) contact.push(`<span>${escapeHtml(data.header.phone)}</span>`);
      if (data.header.email) {
        const email = escapeHtml(data.header.email);
        contact.push(`<a href="mailto:${email}">${email}</a>`);
      }
      if (data.header.linkedin) contact.push(`<a href="${escapeHtml(data.header.linkedin)}" target="_blank" rel="noreferrer">LinkedIn</a>`);
      if (data.header.github) contact.push(`<a href="${escapeHtml(data.header.github)}" target="_blank" rel="noreferrer">GitHub</a>`);

      const experienceHtml = data.experience.map((company) => {
        const roles = company.roles.map((role) => `
          <article class="role">
            <div class="role-top">
              <h4>${escapeHtml(role.title)}</h4>
              <p>${escapeHtml(role.dates)}</p>
            </div>
            <ul>${role.bullets.map((b) => `<li>${escapeHtml(b)}</li>`).join("")}</ul>
          </article>
        `).join("");

        return `
          <article class="card">
            <div class="card-top">
              <h3>${escapeHtml(company.company)}</h3>
              <p>${escapeHtml(company.location)}</p>
            </div>
            ${roles}
          </article>
        `;
      }).join("");

      const projectsHtml = data.projects.map((project) => `
        <article class="card">
          <div class="card-top">
            <h3>${escapeHtml(project.name)}</h3>
            <p>${escapeHtml(project.dates)}</p>
          </div>
          <p class="meta">${escapeHtml(project.stack)}</p>
          <ul>${project.bullets.map((b) => `<li>${escapeHtml(b)}</li>`).join("")}</ul>
        </article>
      `).join("");

      const skillsHtml = data.skills.map((skill) => `
        <article class="skill-row">
          <h3>${escapeHtml(skill.label)}</h3>
          <p>${escapeHtml(skill.values)}</p>
        </article>
      `).join("");

      const speakingHtml = data.speaking.map((item) => `
        <article class="card">
          <div class="card-top">
            <h3>${escapeHtml(item.title)}</h3>
            <p>${escapeHtml(item.dates)}</p>
          </div>
          <p class="meta">${escapeHtml(item.details)}</p>
        </article>
      `).join("");

      const tabs = [];
      const panels = [];
      if (data.experience.length) {
        tabs.push({ id: "panel-experience", label: "Experience" });
        panels.push(`<section id="panel-experience" class="panel"><h2>Experience</h2>${experienceHtml}</section>`);
      }
      if (data.projects.length) {
        tabs.push({ id: "panel-projects", label: "Projects" });
        panels.push(`<section id="panel-projects" class="panel"><h2>Projects</h2>${projectsHtml}</section>`);
      }
      if (data.skills.length) {
        tabs.push({ id: "panel-skills", label: "Skills" });
        panels.push(`<section id="panel-skills" class="panel"><h2>Technical Skills</h2>${skillsHtml}</section>`);
      }
      if (data.speaking.length) {
        tabs.push({ id: "panel-speaking", label: "Speaking" });
        panels.push(`<section id="panel-speaking" class="panel"><h2>Speaking</h2>${speakingHtml}</section>`);
      }

      tabs.unshift({ id: "panel-github", label: "GitHub" });
      panels.unshift(`
        <section id="panel-github" class="panel">
          <h2>GitHub Repos</h2>
          <div id="github-data" class="notice">Loading repositories...</div>
          <h2>Recent Contributions</h2>
          <div id="github-contrib" class="notice">Scanning recent contribution activity...</div>
        </section>
      `);

      const tabButtons = tabs
        .map((tab, idx) => `<li><button class="tab-btn${idx === 0 ? " active" : ""}" role="tab" aria-selected="${idx === 0 ? "true" : "false"}" data-tab="${tab.id}">${tab.label}</button></li>`)
        .join("");

      app.innerHTML = `
        <header>
          <div class="identity">
            <div class="identity-main">
              <h1>${escapeHtml(data.header.name)}</h1>
              <div class="contact">${contact.join(" ")}</div>
            </div>
            <a class="avatar-link" href="${escapeHtml(data.header.github || "https://github.com/y0usaf")}" target="_blank" rel="noreferrer" aria-label="GitHub profile">
              <img id="profile-avatar" alt="GitHub profile photo">
            </a>
          </div>
        </header>

        <ul class="tabs" role="tablist" aria-label="Resume sections">
          ${tabButtons}
        </ul>

        ${panels.join("")}
      `;

      initTabs("panel-github");
      loadGithubData(parseGitHubUsername(data.header.github));
    }

    async function loadResume() {
      const app = document.getElementById("app");
      try {
        const response = await fetch(RESUME_TEX_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const tex = stripLineComments(await response.text());
        const sections = extractSections(tex);
        const data = {
          header: parseHeader(tex),
          experience: parseExperience(sections["Experience"] || ""),
          projects: parseProjects(sections["Projects"] || sections["Projects & Contributions"] || ""),
          skills: parseSkills(sections["Technical Skills"] || ""),
          speaking: parseSpeaking(sections["Speaking"] || "")
        };

        render(data);
      } catch (error) {
        app.innerHTML = `<div class="notice">Failed to load resume from <code>${escapeHtml(RESUME_TEX_URL)}</code><br>${escapeHtml(String(error))}</div>`;
      }
    }

    loadResume();
  </script>
</body>
</html>
